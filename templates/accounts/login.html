{% extends "base.html" %}
{% block title %}Log in · Evidra{% endblock %}
{% block content %}
  <section class="card narrow">
    <h1>Log in</h1>
    <form method="post" novalidate>
      {% csrf_token %}
      {{ form.non_field_errors }}
      {% for field in form %}
        <div class="field">
          {{ field.label_tag }}
          {{ field }}
          {{ field.errors }}
        </div>
      {% endfor %}
      <button type="submit">Log in</button>
    </form>
  </section>
{% endblock %}

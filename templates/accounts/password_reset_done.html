{% extends "base.html" %}
{% block title %}Reset email sent · Evidra{% endblock %}
{% block content %}
  <section class="auth-page">
    <div class="auth-panel">
      <div class="auth-card">
        <p class="eyebrow">Check your email</p>
        <h1>Password reset email sent</h1>
        <p>If an account exists for the email you entered, password reset instructions are on the way.</p>
        <p><a href="{% url 'accounts:login' %}">Back to log in</a></p>
      </div>
    </div>
  </section>
{% endblock %}
